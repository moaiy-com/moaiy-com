version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "direct"
    groups:
      astro_stack:
        patterns:
          - "astro"
          - "@astrojs/*"
      react_stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      three_stack:
        patterns:
          - "three"
          - "@react-three/*"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Asia/Shanghai"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
