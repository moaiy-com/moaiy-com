<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R3F Test - Minimal</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0A0E27;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #4ECDC4;
      font-family: monospace;
      font-size: 14px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="info">
    <div>Testing React Three Fiber...</div>
    <div id="status">Loading...</div>
  </div>
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "three": "https://esm.sh/three@0.159.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,three"
      }
    }
  </script>

  <script type="module">
    import React, { useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas, useFrame } from '@react-three/fiber';

    console.log('✅ All modules loaded');

    // Simple rotating cube
    function RotatingCube() {
      const meshRef = useRef();

      useFrame((state, delta) => {
        if (meshRef.current) {
          meshRef.current.rotation.x += 0.01;
          meshRef.current.rotation.y += 0.01;
        }
      });

      console.log('✅ RotatingCube component rendering');

      return (
        <mesh ref={meshRef} position={[0, 0, 0]}>
          <boxGeometry args={[2, 2, 2]} />
          <meshStandardMaterial color="#4ECDC4" />
        </mesh>
      );
    }

    // Main app
    function App() {
      console.log('✅ App component rendering');

      return (
        <Canvas
          camera={{ position: [0, 0, 5], fov: 75 }}
          style={{ background: 'linear-gradient(180deg, #0A0E27 0%, #151B3B 50%, #1E2545 100%)' }}
          onCreated={({ gl }) => {
            console.log('✅ Canvas created');
            console.log('Canvas size:', gl.domElement.width, 'x', gl.domElement.height);
            
            const context = gl.getContext();
            if (context) {
              console.log('Drawing buffer:', context.drawingBufferWidth, 'x', context.drawingBufferHeight);
            }
            
            document.getElementById('status').innerHTML = 
              '<div style="color: #4ECDC4">✅ R3F Canvas ready</div>' +
              '<div>Canvas: ' + gl.domElement.width + ' x ' + gl.domElement.height + '</div>' +
              '<div style="color: #4ECDC4; font-weight: bold;">You should see a MINT GREEN CUBE</div>';
          }}
        >
          <ambientLight intensity={1.0} />
          <directionalLight position={[10, 10, 5]} intensity={1.0} />
          <RotatingCube />
        </Canvas>
      );
    }

    console.log('✅ Rendering app...');
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
    console.log('✅ App rendered');
  </script>
</body>
</html>
