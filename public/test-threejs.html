<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Three.js Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0A0E27;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #4ECDC4;
      font-family: monospace;
      font-size: 14px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="info">
    <div>Testing Three.js rendering...</div>
    <div id="status">Loading...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.159.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    console.log('✅ Three.js loaded, version:', THREE.REVISION);

    // Create scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0A0E27);
    console.log('✅ Scene created');

    // Create camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    console.log('✅ Camera created at:', camera.position);

    // Create renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    console.log('✅ Renderer created');
    console.log('Canvas size:', renderer.domElement.width, 'x', renderer.domElement.height);

    // Add lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);
    console.log('✅ Ambient light added');

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);
    console.log('✅ Directional light added');

    // Create a bright red cube (very visible)
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshStandardMaterial({ 
      color: 0xff0000,
      roughness: 0.5,
      metalness: 0.5
    });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);
    console.log('✅ Red cube added to scene');
    console.log('Cube position:', cube.position);
    console.log('Cube scale:', cube.scale);

    // Update status
    document.getElementById('status').innerHTML = 
      '<div style="color: #4ECDC4">✅ Scene ready</div>' +
      '<div>Canvas: ' + renderer.domElement.width + ' x ' + renderer.domElement.height + '</div>' +
      '<div style="color: red; font-weight: bold;">You should see a RED CUBE</div>';

    // Animation loop
    let frameCount = 0;
    function animate() {
      requestAnimationFrame(animate);
      
      frameCount++;
      
      // Rotate cube
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
      
      // Render
      renderer.render(scene, camera);
      
      if (frameCount % 60 === 0) {
        console.log('Frame:', frameCount, '- Rendering...');
      }
    }

    console.log('✅ Starting animation loop');
    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('✅ Window resized');
    });

    // Log every 5 seconds
    setInterval(() => {
      console.log('⏱️ Still rendering... Frame:', frameCount);
    }, 5000);
  </script>
</body>
</html>
